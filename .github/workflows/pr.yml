name: PR Build

on:
  pull_request:

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y binutils-dev

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install binutils

      - name: Configure
        run: cmake -B build -S .

      - name: Build
        run: cmake --build build --parallel

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: codeinjector-${{ matrix.os }}
          path: build/codeinjector
          retention-days: 1

  test-coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y binutils-dev python3-pip
          pip install pytest gcovr

      - name: Build with coverage
        run: |
          cmake -B build -S . -DCMAKE_BUILD_TYPE=Coverage
          cmake --build build --parallel

      - name: Run tests
        run: pytest tests/ --binary=build/codeinjector -v

      - name: Report coverage
        run: |
          gcovr \
            --root . \
            --exclude 'build/.*' \
            --exclude 'tests/.*' \
            --markdown \
            >> $GITHUB_STEP_SUMMARY
