name: PR Build

on:
  pull_request:

jobs:
  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Run clippy with all warnings denied
        run: cargo clippy -- -D warnings

  build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: Install dependencies
        run: uv sync

      - name: Build wheel
        run: uv run maturin build --release --out dist

      - name: Install wheel and run tests
        run: |
          uv pip install --force-reinstall dist/*.whl
          uv run pytest tests/ --binary "$(uv run which codeinjector)" -v

      - name: Upload wheel
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: wheel-${{ matrix.os }}
          path: dist/*.whl
          retention-days: 2

  test-coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - uses: taiki-e/install-action@789fcf404486ad49a9a91ceb1acfb43caac96664 # cargo-llvm-cov

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: Install dependencies
        run: uv sync

      - name: Build instrumented binary, run tests, and generate coverage
        run: |
          source <(cargo llvm-cov show-env --sh)
          cargo build
          uv run pytest tests/ --binary ./target/debug/codeinjector -v
          cargo llvm-cov report --lcov --output-path lcov.info
          {
            echo '## Coverage'
            echo '```'
            cargo llvm-cov report --summary-only
            echo '```'
          } >> $GITHUB_STEP_SUMMARY

      - name: Upload coverage report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: coverage-lcov
          path: lcov.info
          retention-days: 7
