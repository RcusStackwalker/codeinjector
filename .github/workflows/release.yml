name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.get-tag.outputs.tag }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      - uses: tomtom-international/commisery-action/bump@f88e8737a52bfbe4b20225399da697acdda5035d # v7.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          create-release: true

      - name: Get created tag
        id: get-tag
        run: |
          git fetch --tags
          echo "tag=$(git describe --tags --abbrev=0)" >> $GITHUB_OUTPUT

  build-wheels:
    needs: release
    if: needs.release.outputs.tag != ''
    strategy:
      matrix:
        include:
          # Linux: use maturin-action for proper manylinux wheels
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
          # macOS: native arm64 build
          - os: macos-latest
            target: aarch64-apple-darwin
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ needs.release.outputs.tag }}

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Set version from tag
        run: |
          VERSION="${{ needs.release.outputs.tag }}"
          VERSION="${VERSION#v}"
          sed -i.bak "s/^version = \"[^\"]*\"/version = \"$VERSION\"/" Cargo.toml
          rm -f Cargo.toml.bak

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      - name: Install dependencies
        run: uv sync

      - name: Build Linux wheel (manylinux via maturin-action)
        if: runner.os == 'Linux'
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1
        with:
          target: ${{ matrix.target }}
          manylinux: 2_28
          args: --release --out dist --locked

      - name: Build macOS wheel
        if: runner.os == 'macOS'
        run: uv run maturin build --release --out dist --locked --target ${{ matrix.target }}

      - name: Upload wheel to release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3
        with:
          tag_name: ${{ needs.release.outputs.tag }}
          files: dist/*.whl
